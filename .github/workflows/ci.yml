name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run architecture tests
        run: uv run pytest tests -v

      - name: Run pylint
        run: |
          score=$(uv run pylint app --output-format=text 2>&1 | grep "Your code has been rated" | grep -oP '[0-9]+\.[0-9]+(?=/10)')
          echo "pylint score: $score"
          uv run python -c "import sys; score=float('$score'); sys.exit(0 if score >= 10.0 else 1)"

  frontend:
    name: Frontend validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node.js dependencies
        run: npm ci

      - name: Architecture validation
        run: npm run arch:validate

      - name: TypeScript build check
        run: npm run build

      - name: Run frontend tests
        run: npm test --silent

  integration:
    if: env.RUN_E2E == '1'
    name: Integration tests (DB + migrations + tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: genlogs
          POSTGRES_USER: genlogs
          POSTGRES_PASSWORD: genlogs_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U genlogs" --health-interval 5s --health-timeout 5s --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -q pytest fastapi uvicorn sqlmodel alembic psycopg2-binary httpx requests pydantic-settings prometheus-client
      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -U genlogs; do sleep 1; done
      - name: Run migrations
        run: |
          PYTHONPATH=./backend/src alembic -c backend/alembic.ini upgrade head
      - name: Seed DB
        run: |
          PYTHONPATH=./backend/src python backend/scripts/seed_data.py
      - name: Start uvicorn
        run: |
          PYTHONPATH=./backend/src uv run uvicorn app.main:app --host 127.0.0.1 --port 8001 &
          sleep 2
      - name: Run E2E tests
        run: |
          PYTHONPATH=./backend/src pytest backend/tests/functional_e2e -q
