name: Deploy Backend

permissions:
  contents: read
  id-token: write

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    name: Build and deploy to Cloud Run
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ secrets.GCP_REGION }}
      REPOSITORY: ${{ secrets.ARTIFACT_REPO }}
      IMAGE: genlogs-backend
      SERVICE_NAME: genlogs-backend
      RUN_MIGRATIONS: 'true'
      # expose these secrets as env so they can be tested in step 'if' expressions
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_WORKLOAD_IDENTITY_SA: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
    steps:
      - uses: actions/checkout@v4

      # Authenticate to GCP. Try Workload Identity first, fallback to service account key.
      - name: Authenticate to Google Cloud (Workload Identity)
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && env.GCP_WORKLOAD_IDENTITY_SA != '' }}
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_WORKLOAD_IDENTITY_SA }}

      - name: Authenticate to Google Cloud (Service Account key)
        if: ${{ env.GCP_SA_KEY != '' }}
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          install_components: 'beta'

      - name: Debug authenticated identity
        run: |
          set -euo pipefail
          echo "=== gcloud auth list ==="
          gcloud auth list --format="value(account,status)" || true
          echo "=== gcloud config account ==="
          gcloud config get-value account || true
          echo "=== Print identity token (if available) ==="
          gcloud auth print-identity-token || true
          echo "=== Optional: service account IAM policy (may require permissions) ==="
          gcloud iam service-accounts get-iam-policy "${{ secrets.GCP_WORKLOAD_IDENTITY_SA }}" --format="json" || true

      - name: Authenticate to Google Cloud (Service Account key fallback)
        if: ${{ env.GCP_SA_KEY != '' }}
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker --quiet

      - name: Docker login to Artifact Registry (explicit)
        run: |
          set -euo pipefail
          REPO_HOST="${{ env.REGION }}-docker.pkg.dev"
          echo "Logging into $REPO_HOST"
          gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin https://$REPO_HOST

      - name: Build and push image (docker build + push)
        working-directory: backend
        run: |
          set -euo pipefail
          REPO_PATH="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}"
          IMAGE_TAG="${{ github.sha }}"
          IMAGE="$REPO_PATH:$IMAGE_TAG"
          echo "Building image $IMAGE"

          # Build and push from the runner (requires the GitHub-invoked service account to have Artifact Registry writer permissions)
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

          # Resolve digest via Artifact Registry (retry while it becomes available)
          IMAGE_REF=""
          for attempt in $(seq 1 10); do
            DIGEST=$(gcloud artifacts docker images describe "$IMAGE" --project="${{ env.PROJECT_ID }}" --format='get(image_summary.digest)' 2>/dev/null || true)
            if [ -n "$DIGEST" ]; then
              IMAGE_REF="$REPO_PATH@$DIGEST"
              break
            fi
            echo "Digest not present yet for $IMAGE; retrying ($attempt)"
            sleep 3
          done

          # Fallback: list latest digest from repository
          if [ -z "$IMAGE_REF" ]; then
            echo "Falling back to listing latest digest from repo $REPO_PATH"
            for attempt in $(seq 1 10); do
              DIGEST="$(gcloud artifacts docker images list "$REPO_PATH" --project="${{ env.PROJECT_ID }}" --format='value(digest)' --sort-by='~createTime' --limit=1 2>/dev/null || true)"
              if [ -n "$DIGEST" ]; then
                IMAGE_REF="$REPO_PATH@$DIGEST"
                break
              fi
              echo "No digest yet in Artifact Registry for $REPO_PATH; retrying ($attempt)"
              sleep 3
            done
          fi

          if [ -z "$IMAGE_REF" ]; then
            echo "Failed to resolve image digest for $REPO_PATH" >&2
            exit 1
          fi
          echo "IMAGE_REF=$IMAGE_REF" >> $GITHUB_ENV
          echo "Resolved IMAGE_REF=$IMAGE_REF"
      - name: Get Cloud SQL connection name
        id: sql
        run: |
          set -euo pipefail
          INSTANCE_CONN=$(gcloud sql instances describe genlogs-db --project=${{ env.PROJECT_ID }} --format='get(connectionName)')
          if [ -z "$INSTANCE_CONN" ]; then
            echo "Could not get Cloud SQL instance connection name" >&2
            exit 1
          fi
          echo "INSTANCE_CONN=$INSTANCE_CONN" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        env:
          CORS_ORIGINS: "https://genlogs-4e471.web.app,https://genlogs-4e471.firebaseapp.com"
        run: |
          set -euo pipefail
          echo "Deploying ${{ env.SERVICE_NAME }} to Cloud Run with image $IMAGE_REF"
          # Escape commas in CORS_ORIGINS so gcloud parses it as a single value
          ESCAPED_CORS=$(printf '%s' "${CORS_ORIGINS}" | sed 's/,/\\,/g')
          ENV_PAIRS="DB_HOST=/cloudsql/$INSTANCE_CONN,DB_PORT=5432,POSTGRES_USER=postgres,GENLOGS_CORS_ORIGINS=$ESCAPED_CORS"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image="$IMAGE_REF" \
            --region=${{ env.REGION }} --platform=managed --allow-unauthenticated \
            --add-cloudsql-instances="$INSTANCE_CONN" \
            --set-secrets=DB_PASSWORD=genlogs-db-pass:latest \
            --set-env-vars "$ENV_PAIRS" \
            --project=${{ env.PROJECT_ID }} --quiet

      - name: Run migrations via Cloud Run Job (optional)
        if: ${{ env.RUN_MIGRATIONS == 'true' }}
        run: |
          set -euo pipefail
          echo "Creating and executing migration job"
          # create is idempotent; ignore error if already exists
          gcloud run jobs create genlogs-migrate-job --image="$IMAGE_REF" --region=${{ env.REGION }} --command="sh" --args='-c','alembic upgrade head' --project=${{ env.PROJECT_ID }} || true
          gcloud run jobs execute genlogs-migrate-job --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }} --wait
