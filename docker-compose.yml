version: '3.8'

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: genlogs
      POSTGRES_PASSWORD: genlogs_pass
      POSTGRES_DB: genlogs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genlogs"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  pgdata:
